services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipelinehub
      POSTGRES_USER: pipelinehub
      POSTGRES_PASSWORD: pipelinehub_secret
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pipelinehub']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4001:4000'
    environment:
      DATABASE_URL: postgresql://pipelinehub:pipelinehub_secret@postgres:5432/pipelinehub
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      FRONTEND_URL: http://localhost:3001
      BACKEND_URL: http://localhost:4001
      PORT: 4000
      GITHUB_TOKEN: ${github_token:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             node dist/seed.js &&
             node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4001/api
        NEXT_PUBLIC_WS_URL: http://localhost:4001
    ports:
      - '3001:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
